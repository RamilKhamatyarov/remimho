quarkus:
  http:
    body:
      handle-file-uploads: false

  vertx:
    event-loops-pool-size: 4

  thread-pool:
    core-threads: 8
    max-threads: 200
    queue-size: 10000
    shutdown-timeout: 60

  log:
    level: INFO
    category:
      "ru.rkhamatyarov":
        level: DEBUG
      "ru.rkhamatyarov.websocket":
        level: DEBUG
    

  quinoa:
    ui-dir: src/main/resources/META-INF/resources
    build-dir: dist
    package-manager-install: false
    dev-server:
      port: 5173
  native:
    additional-build-args: >
      -H:IncludeResources=.*\\.proto,
      --initialize-at-run-time=com.google.protobuf,
      --initialize-at-run-time=ru.rkhamatyarov.proto,
      -H:+ReportExceptionStackTraces
    resources:
      includes:
        - "META-INF/resources/**"
        - ".*\\.html"
        - ".*\\.css"
        - ".*\\.js"
        - "assets/.*"
        - ".*\\.proto"
  websockets-next:
    server:
      supported-subprotocols: binary

  scheduler:
    enabled: true

remimho:
  client:
    interpolation-enabled: false
  coroutines:
    state-flow-enabled: false
  rooms:
    enabled: true
  engine:
    mvi:
      enabled: false
  browser:
    open: true
    url: http://localhost:8080
